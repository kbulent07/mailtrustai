# ============================================================
# MailTrustAI — MÜŞTERİ KURULUMU (customer host)
#
# Müşteri host'unda SADECE customer image'i çalışır. Bayi/keygen/license-core
# yoktur (Dockerfile build sırasında fiziksel olarak çıkarılır).
#
# Kullanım:
#   cp .env.docker.example .env.docker
#   # MSA_LICENSE_KEY ve MSA_LICENSE_REMOTE_URL'i doldur
#   docker compose --env-file .env.docker -f docker-compose.customer.yml up -d --build
# ============================================================

name: mailtrustai-customer

services:
  customer:
    image: mailtrustai-customer:latest
    build:
      context: .
      dockerfile: apps/customer/Dockerfile
    container_name: mailtrustai-customer
    restart: unless-stopped
    # hostname sabit — settingsStore şifreleme anahtarı türevi.
    hostname: mailtrustai
    environment:
      NODE_ENV: production
      PORT: 3000
      MSA_CUSTOMER_ONLY: "true"
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      MSA_LICENSE_KEY: ${MSA_LICENSE_KEY:-}
      MSA_LICENSE_REMOTE_URL: ${MSA_LICENSE_REMOTE_URL:?MSA_LICENSE_REMOTE_URL zorunlu}
      MSA_CENTRAL_SYNC_URL: ${MSA_CENTRAL_SYNC_URL:-${MSA_LICENSE_REMOTE_URL}}
      MSA_CENTRAL_SYNC_ENABLED: ${MSA_CENTRAL_SYNC_ENABLED:-true}
      MSA_INSTANCE_ID: ${MSA_INSTANCE_ID:-}
      MSA_HEARTBEAT_INTERVAL_SECONDS: ${MSA_HEARTBEAT_INTERVAL_SECONDS:-300}
      MSA_POLICY_SYNC_INTERVAL_SECONDS: ${MSA_POLICY_SYNC_INTERVAL_SECONDS:-900}
      MSA_LOCAL_ENCRYPTION_KEY: ${MSA_LOCAL_ENCRYPTION_KEY:-}
      # Legacy IMAP credential encryption (src/imap/connection.js)
      MSA_ENC_PASSWORD: ${MSA_ENC_PASSWORD:?MSA_ENC_PASSWORD zorunlu (IMAP cred encrypt)}
      MSA_ENC_SALT: ${MSA_ENC_SALT:?MSA_ENC_SALT zorunlu}
      # Legacy license HMAC (src/license/license.js fallback)
      MSA_LICENSE_SECRET: ${MSA_LICENSE_SECRET:?MSA_LICENSE_SECRET zorunlu}
    ports:
      - "${CUSTOMER_PORT:-3000}:3000"
    volumes:
      - customer-data:/app/data
      - customer-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  customer-data:
  customer-logs:
