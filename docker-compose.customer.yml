# ============================================================
# MailTrustAI — Docker Compose (MÜŞTERİ KURULUMU)
#
# Bu compose dosyası "customer-only" modu etkinleştirir:
#   - /keygen.html ve /bayi.html → 404
#   - /api/dealer/* ve /api/license/{generate,batch,trial,revoke,…} → 404
#
# Nginx reverse-proxy ile birlikte, sadece müşteri yönetim paneli (index.html)
# erişilebilir kalır. SSL sertifikalarınızı nginx/certs/ altına bırakın.
#
# Kullanım:
#   docker compose -f docker-compose.customer.yml up -d --build
# ============================================================

services:
  mailtrustai:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: mailtrustai-customer
    # Sabit hostname: settingsStore.js şifreleme anahtarını hostname'den türetir.
    # Konteyner yeniden derlenince hostname değişmemeli.
    hostname: mailtrustai
    restart: always

    env_file:
      - .env

    environment:
      - NODE_ENV=production
      - MSA_CUSTOMER_ONLY=true

    expose:
      - "3000"

    volumes:
      - mailtrustai_data:/app/data
      - mailtrustai_logs:/app/logs

    networks:
      - mailtrustai_net

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  nginx:
    image: nginx:1.27-alpine
    container_name: mailtrustai-customer-nginx
    restart: always
    depends_on:
      mailtrustai:
        condition: service_healthy

    ports:
      - "3000:80"
      - "4443:443"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/webroot:/var/www/certbot:ro

    networks:
      - mailtrustai_net

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mailtrustai_data:
    driver: local
  mailtrustai_logs:
    driver: local

networks:
  mailtrustai_net:
    driver: bridge
