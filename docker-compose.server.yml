# Kurucu/satici tarafi - license-server + dealer ayni host'ta, ortak network.
# Musteri host'una asla deploy edilmez.

networks:
  msa-internal:
    driver: bridge

services:
  mariadb:
    image: mariadb:11.4
    container_name: mailtrustai-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: mailtrustai_license
      MARIADB_USER: mailtrustai
      MARIADB_PASSWORD: mailtrustai_change_me
      MARIADB_ROOT_PASSWORD: root_change_me
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "3306:3306"
    volumes:
      - ./data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot_change_me"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [msa-internal]

  license-server:
    image: mailtrustai-license-server:latest
    build:
      context: .
      dockerfile: apps/license-server/Dockerfile
    container_name: mailtrustai-license-server
    restart: unless-stopped
    env_file:
      - apps/license-server/.env
    environment:
      NODE_ENV: production
      DATA_DIR: /app/data
      LICENSE_DB_CLIENT: mariadb
      LICENSE_DB_PATH: /app/data/license-server.sqlite
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
    ports:
      - "3200:3200"
    volumes:
      - ./data/license-server:/app/data
    depends_on:
      mariadb:
        condition: service_healthy
    networks: [msa-internal]

  dealer:
    image: mailtrustai-dealer:latest
    build:
      context: .
      dockerfile: apps/dealer/Dockerfile
    container_name: mailtrustai-dealer
    restart: unless-stopped
    depends_on: [license-server]
    env_file:
      - apps/dealer/.env
    environment:
      NODE_ENV: production
      LICENSE_SERVER_URL: http://license-server:3200
    ports:
      - "3100:3100"
    networks: [msa-internal]
