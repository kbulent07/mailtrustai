# ============================================================
# MailTrustAI — Docker Compose (Geliştirme)
# Kullanım: docker compose up --build
# ============================================================

services:
  mailtrustai:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: mailtrustai-dev
    # Şifreleme anahtarı hostname'den türetildiği için sabit olmalı.
    hostname: mailtrustai
    restart: unless-stopped

    # .env dosyasından ortam değişkenlerini yükle
    env_file:
      - .env

    # Geliştirme ortamı ek değişkenleri
    environment:
      - NODE_ENV=development

    ports:
      - "3000:3000"

    volumes:
      # Veri kalıcılığı — host dizinine bağla
      - ./data:/app/data
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

    # Kaynak sınırları (geliştirme için gevşek)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
