# ============================================================
# MailTrustAI — Nginx Ters Proxy Yapılandırması
# Docker Compose üretim ortamı için optimize edilmiştir.
# WebSocket desteği dahil.
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Loglama ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performans ──────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Güvenlik başlıkları ──────────────────────────────────
    server_tokens off;

    # ── Upstream: MailTrustAI Node.js ───────────────────────
    upstream mailtrustai_backend {
        server mailtrustai:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS yönlendirme ────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt webroot doğrulaması
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Diğer tüm trafiği HTTPS'e yönlendir
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS sunucusu ──────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # SSL sertifikaları
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Modern SSL yapılandırması
        ssl_protocols              TLSv1.2 TLSv1.3;
        ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;
        ssl_session_cache          shared:SSL:10m;
        ssl_session_timeout        10m;
        ssl_stapling               on;
        ssl_stapling_verify        on;

        # Güvenlik başlıkları
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           SAMEORIGIN always;
        add_header X-Content-Type-Options    nosniff    always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # Yükleme limiti (EML dosyaları için 60MB)
        client_max_body_size 60M;

        # ── WebSocket desteği (Socket.io) ───────────────────
        location /socket.io/ {
            proxy_pass         http://mailtrustai_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        # ── API ve uygulama ─────────────────────────────────
        location / {
            proxy_pass         http://mailtrustai_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Zaman aşımları (büyük EML analizi için)
            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ── Statik dosya önbelleği ───────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://mailtrustai_backend;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }
    }
}
