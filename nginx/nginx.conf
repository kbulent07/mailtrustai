# ============================================================
# MailTrustAI — Nginx Ters Proxy Yapılandırması
# Docker Compose üretim ortamı için optimize edilmiştir.
# WebSocket desteği dahil.
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Loglama ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performans ──────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Güvenlik başlıkları ──────────────────────────────────
    server_tokens off;

    # ── Upstream: MailTrustAI Node.js ───────────────────────
    upstream mailtrustai_backend {
        server mailtrustai:3000;
        keepalive 32;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # ── HTTP Sunucusu (Varsayılan) ──────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt webroot doğrulaması
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API ve uygulama (HTTP üzerinden erişim)
        location / {
            proxy_pass         http://mailtrustai_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            client_max_body_size 60M;
            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }
    }

