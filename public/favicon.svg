<?xml version="1.0" encoding="UTF-8"?>
<!-- MailTrustAI favicon — küçük boyutlarda okunabilir, sade -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MailTrustAI">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"  stop-color="#1e3a8a"/>
            <stop offset="60%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
    </defs>

    <!-- Yuvarlatılmış kare arka plan (modern app icon hissi) -->
    <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>

    <!-- Zarf -->
    <g transform="translate(14,18)" fill="#ffffff">
        <rect x="0" y="6" width="36" height="22" rx="2"/>
        <path d="M0 6 L18 22 L36 6 Z" fill="#e2e8f0"/>
    </g>

    <!-- Beyin/AI işareti (zarfın üst-sağında küçük badge) -->
    <g transform="translate(34,8)">
        <circle cx="10" cy="10" r="10" fill="#67e8f9"/>
        <g fill="#0f172a">
            <circle cx="6"  cy="8"  r="1.6"/>
            <circle cx="10" cy="6"  r="1.6"/>
            <circle cx="14" cy="8"  r="1.6"/>
            <circle cx="7"  cy="13" r="1.6"/>
            <circle cx="13" cy="13" r="1.6"/>
        </g>
        <g stroke="#0f172a" stroke-width="1.2" fill="none" stroke-linecap="round">
            <path d="M6 8 L10 6 L14 8"/>
            <path d="M7 13 L10 6 L13 13"/>
        </g>
    </g>

    <!-- Büyüteç (sağ alt) -->
    <g transform="translate(36,32)">
        <circle cx="10" cy="10" r="9" fill="none" stroke="#ffffff" stroke-width="2.5"/>
        <line x1="17" y1="17" x2="22" y2="22" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    </g>
</svg>
