<?xml version="1.0" encoding="UTF-8"?>
<!--
  MailTrustAI logosu — vektör.
  Büyütülünce keskin kalır; favicon, navbar ve raporlarda kullanılır.
  Renkler: derin lacivert + canlı mavi-mor gradyan.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="MailTrustAI">
    <defs>
        <linearGradient id="mtBrand" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"  stop-color="#1e3a8a"/>
            <stop offset="55%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
        <linearGradient id="mtBrain" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="#67e8f9"/>
            <stop offset="60%"  stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
        <radialGradient id="mtGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Glow halkası -->
    <circle cx="118" cy="118" r="100" fill="url(#mtGlow)"/>

    <!-- Veri akış çizgileri (sol) -->
    <g fill="#3b82f6" opacity="0.85">
        <rect x="6"  y="74"  width="32" height="6" rx="3"/>
        <rect x="0"  y="92"  width="48" height="6" rx="3"/>
        <rect x="14" y="110" width="26" height="6" rx="3"/>
        <rect x="4"  y="128" width="42" height="6" rx="3"/>
        <rect x="20" y="146" width="22" height="6" rx="3"/>
        <rect x="2"  y="164" width="36" height="6" rx="3"/>
    </g>

    <!-- Büyüteç dış halkası -->
    <circle cx="128" cy="118" r="78" fill="none" stroke="url(#mtBrand)" stroke-width="11"/>

    <!-- Büyüteç sapı -->
    <rect x="178" y="172" width="56" height="14" rx="7"
        fill="#0f172a" transform="rotate(45 206 179)"/>
    <rect x="190" y="166" width="36" height="6" rx="3"
        fill="#1e293b" transform="rotate(45 208 169)"/>

    <!-- Zarf gövdesi -->
    <g transform="translate(80,98)">
        <rect x="0" y="0" width="96" height="60" rx="6" fill="#ffffff"/>
        <!-- Zarf kapağı -->
        <path d="M0 0 L48 36 L96 0 Z" fill="#e2e8f0"/>
        <path d="M0 0 L48 36 L96 0" fill="none" stroke="#cbd5e1" stroke-width="1.5"/>
    </g>

    <!-- Beyin (zarftan dışarı çıkar — AI tarama mecazı) -->
    <g transform="translate(96,62)">
        <!-- Beyin gövdesi (basitleştirilmiş 2 lob) -->
        <path d="M32 4
                 C 18 4, 10 14, 10 26
                 C 4 28, 4 38, 12 42
                 C 12 50, 22 56, 32 54
                 C 42 56, 52 50, 52 42
                 C 60 38, 60 28, 54 26
                 C 54 14, 46 4, 32 4 Z"
              fill="url(#mtBrain)" opacity="0.95"/>

        <!-- Devre düğümleri -->
        <g fill="#0f172a" opacity="0.85">
            <circle cx="20" cy="18" r="2"/>
            <circle cx="32" cy="14" r="2"/>
            <circle cx="44" cy="18" r="2"/>
            <circle cx="16" cy="34" r="2"/>
            <circle cx="32" cy="30" r="2"/>
            <circle cx="48" cy="34" r="2"/>
            <circle cx="22" cy="46" r="2"/>
            <circle cx="42" cy="46" r="2"/>
        </g>
        <!-- Devre çizgileri -->
        <g stroke="#0f172a" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round">
            <path d="M20 18 L32 14 L44 18"/>
            <path d="M16 34 L32 30 L48 34"/>
            <path d="M32 14 L32 30"/>
            <path d="M22 46 L32 30 L42 46"/>
        </g>
    </g>
</svg>
